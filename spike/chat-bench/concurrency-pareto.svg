<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 446" width="720" height="446" font-family="sans-serif" role="img" aria-labelledby="t d">
  <title id="t">Concurrency Pareto frontier: per-stream decode vs aggregate throughput</title>
  <desc id="d">As --parallel rises 1 to 4, aggregate throughput climbs (Qwen 14 to 27, Llama 14 to 27, Mistral 15 to 30 tok/s) while per-stream decode falls (14 to 7.4, 14 to 7.5, 15 to 8.2). The elbow is at 2 slots: going 1 to 2 barely lowers per-stream speed; 2 to 4 costs more. White card background so it reads on light and dark themes.</desc>
  <rect x="0.5" y="0.5" width="719" height="445" rx="6" fill="#ffffff" stroke="#d0d7de"/>
  <text x="60" y="30" font-size="16" font-weight="600" fill="#1f2328">Per-stream decode vs aggregate throughput — Deck APU (RADV Vulkan)</text>

  <!-- gridlines -->
  <g stroke="#eaecef" stroke-width="1">
    <line x1="100" y1="50" x2="100" y2="380"/><line x1="220" y1="50" x2="220" y2="380"/>
    <line x1="340" y1="50" x2="340" y2="380"/><line x1="460" y1="50" x2="460" y2="380"/>
    <line x1="580" y1="50" x2="580" y2="380"/><line x1="700" y1="50" x2="700" y2="380"/>
    <line x1="70" y1="380" x2="700" y2="380"/><line x1="70" y1="314" x2="700" y2="314"/>
    <line x1="70" y1="248" x2="700" y2="248"/><line x1="70" y1="182" x2="700" y2="182"/>
    <line x1="70" y1="116" x2="700" y2="116"/><line x1="70" y1="50" x2="700" y2="50"/>
  </g>
  <!-- axes -->
  <g stroke="#8a8a86" stroke-width="1.2">
    <line x1="70" y1="50" x2="70" y2="380"/><line x1="70" y1="380" x2="700" y2="380"/>
  </g>
  <!-- x tick labels -->
  <g font-size="12" fill="#57606a" text-anchor="middle">
    <text x="100" y="398">12</text><text x="220" y="398">16</text><text x="340" y="398">20</text>
    <text x="460" y="398">24</text><text x="580" y="398">28</text><text x="700" y="398">32</text>
  </g>
  <!-- y tick labels -->
  <g font-size="12" fill="#57606a" text-anchor="end">
    <text x="60" y="384">6</text><text x="60" y="318">8</text><text x="60" y="252">10</text>
    <text x="60" y="186">12</text><text x="60" y="120">14</text><text x="60" y="54">16</text>
  </g>
  <!-- axis titles -->
  <text x="385" y="422" font-size="13" fill="#1f2328" text-anchor="middle">aggregate throughput (tok/s)  —  more capacity →</text>
  <text transform="rotate(-90 22 215)" x="22" y="215" font-size="13" fill="#1f2328" text-anchor="middle">per-stream decode (tok/s)  —  more responsive →</text>

  <!-- Qwen #534AB7 (circle) -->
  <polyline points="171.4,103.5 353.8,208.1 542.5,332.8" fill="none" stroke="#534AB7" stroke-width="2"/>
  <g fill="#534AB7" stroke="#ffffff" stroke-width="1">
    <circle cx="171.4" cy="103.5" r="5.5"/><circle cx="353.8" cy="208.1" r="5.5"/><circle cx="542.5" cy="332.8" r="5.5"/>
  </g>
  <!-- Llama #1D9E75 (diamond) -->
  <polyline points="152.2,124.6 363.4,202.1 538.6,331.8" fill="none" stroke="#1D9E75" stroke-width="2"/>
  <g fill="#1D9E75" stroke="#ffffff" stroke-width="1">
    <path d="M152.2,118.6 L158.2,124.6 L152.2,130.6 L146.2,124.6 Z"/>
    <path d="M363.4,196.1 L369.4,202.1 L363.4,208.1 L357.4,202.1 Z"/>
    <path d="M538.6,325.8 L544.6,331.8 L538.6,337.8 L532.6,331.8 Z"/>
  </g>
  <!-- Mistral #D85A30 (triangle) -->
  <polyline points="183.1,90.6 448,165.8 652.3,309.1" fill="none" stroke="#D85A30" stroke-width="2"/>
  <g fill="#D85A30" stroke="#ffffff" stroke-width="1">
    <path d="M183.1,84.6 L188.5,93.6 L177.7,93.6 Z"/>
    <path d="M448,159.8 L453.4,168.8 L442.6,168.8 Z"/>
    <path d="M652.3,303.1 L657.7,312.1 L646.9,312.1 Z"/>
  </g>
  <!-- per-point parallel labels -->
  <g font-size="11" fill="#57606a">
    <text x="160" y="96">1×</text><text x="364" y="205">2×</text><text x="552" y="332">4×</text>
    <text x="566" y="318" fill="#534AB7">Qwen 26.8</text>
    <text x="660" y="306" fill="#D85A30">Mistral 30.4</text>
  </g>

  <!-- legend (lower-left empty region) -->
  <g font-size="12" fill="#1f2328">
    <circle cx="100" cy="312" r="5.5" fill="#534AB7"/><text x="112" y="316">Qwen2.5-7B</text>
    <path d="M100,328 L106,334 L100,340 L94,334 Z" fill="#1D9E75"/><text x="112" y="338">Llama-3.1-8B</text>
    <path d="M100,348 L105.4,357 L94.6,357 Z" fill="#D85A30"/><text x="112" y="360">Mistral-7B v0.3</text>
    <text x="94" y="378" font-size="11" fill="#57606a">labels = --parallel slots · 2026-06-21</text>
  </g>
</svg>
